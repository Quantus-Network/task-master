# TaskMaster Configuration

[server]
host = "127.0.0.1"
port = 3000
cors_allowed_origins = ["http://localhost:4321"]

[candidates]
# GraphQL endpoint to fetch candidate addresses (local/dev default)
graphql_url = "http://127.0.0.1:4000/graphql"

[data]
# Database configuration
database_url = "postgres://postgres:postgres@127.0.0.1:55432/task_master"

[logging]
# Log level: error, warn, info, debug, trace
level = "info"

[jwt]
admin_secret = "test-secret"
exp_in_hours = 24
secret = "test-secret"

[x_oauth]
callback_url = "http://localhost:12345/api/auth/x/callback"
client_id = "test-id"
client_secret = "test-secret"

[remote_configs]
wallet_configs_file = "../wallet_configs/test_configs.json"

[risk_checker]
etherscan_api_key = "change-me"
etherscan_base_url = "https://api.etherscan.io/v2/api?chainid=1"
infura_api_key = "change-me"
infura_base_url = "https://mainnet.infura.io/v3"
etherscan_calls_per_sec = 3
max_concurrent_requests = 1

[exchange_rate]
api_key = "test-key"
